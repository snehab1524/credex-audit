name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          # Tests don't need real secrets — audit engine is pure logic
          MONGODB_URI: "mongodb://localhost:27017/test"
          ANTHROPIC_API_KEY: "sk-ant-test"
          RESEND_API_KEY: "re_test"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
